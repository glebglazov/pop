# pop configuration
# Place this file at ~/.config/pop/config.toml

# Include additional config files (only their projects entries are merged)
# Paths support ~ expansion and are resolved relative to this config file
# includes = ["work.toml", "~/Dev/personal.toml"]

# List of project directories
# Each entry is an object with:
#   - path (required): exact path or glob pattern
#   - display_depth (optional, default 1): number of trailing path segments to show
projects = [
    { path = "~/.local/share/chezmoi" },
    { path = "~/Dev/*/*", display_depth = 2 },
]

# Global custom keybindings for the picker
# Section-specific commands ([project] or [worktree]) override global ones matched by key
# commands = [
#     { key = "ctrl-l", label = "logs", command = "tail -f app.log", exit = false },
# ]

# Exclude the current tmux session from the picker
# exclude_current_session = false

# How to disambiguate projects with the same display name
# Options: "first_unique_segment" (default), "full_path"
# disambiguation_strategy = "first_unique_segment"

# Modifier key for quick-access number shortcuts (1-9) in the picker
# Options: "alt" (default), "ctrl", "disabled"
# quick_access_modifier = "alt"

# [project]
# Project-picker custom keybindings (override global commands matched by key)
# commands = [
#     { key = "ctrl-l", label = "logs", command = "tail -f app.log", exit = false },
# ]
# Show desktop notifications when a pane becomes unread while in the project picker
# unread_notifications_enabled = false

# [worktree]
# Worktree-specific custom keybindings (override global commands matched by key)
# commands = [
#     { key = "ctrl-l", label = "logs", command = "tail -f app.log", exit = false },
# ]
# Show desktop notifications when a pane becomes unread while in worktree view
# unread_notifications_enabled = false

# [workbench]
# Workbenches are named blueprints for a session's tmux windows and pane trees.
# When pick_on_create is on, selecting a project/worktree with no live session and
# at least one resolved Workbench prompts you to pick one (or "<empty>" for a plain
# session) before the session is created. Defaults to off (no prompt).
# pick_on_create = true
#
# order fixes the display sequence of the interactive Workbench lists (the create
# prompt and the ctrl+w Preferred-workbench picker). Tokens are the literal
# on-screen labels: Workbench names plus the special options "<empty>" and
# "<reset>". Named tokens front-load in this order; everything unnamed follows in
# the default order ("<empty>", Workbenches in resolution order, "<reset>"). A
# token that resolves to nothing is ignored. With the example below and both
# Workbenches resolved, the preferred picker renders: minimal, <empty>, full-dev,
# <reset>.
# order = ["minimal"]

# [[workbenches]]
# name = "minimal"
# windows = [{ name = "edit", layout = { command = "nvim" } }]

# [[workbenches]]
# name = "full-dev"
# before_apply = ["git pull --ff-only"]
# [[workbenches.windows]]
# name = "edit"
# [workbenches.windows.layout]
# children = "columns"
# panes = [
#     { command = "nvim", focus = true, weight = 2 },
#     { command = "git status", weight = 1 },
# ]

# [pane_monitoring]
# Automatically downgrade unread to clear when the pane is currently
# active (visible and focused). Useful if you're already watching the output.
# dismiss_unread_in_active_pane = false
#
# Ignore set-status calls from specific sources. The tmux global hooks pass
# --source tmux-global. Set this to disable auto-read on tmux navigation
# while still allowing explicit reads from the dashboard.
# ignore_status_from = ["tmux-global"]
#
# Topic derivation pipeline: an ordered list of typed steps pop runs to derive a
# pane's Topic (ADR 0068). Each step is either type = "truncate" (cheap local
# prompt truncation → a provisional seed) or type = "agent" (a curated agent-CLI
# Topic recipe → a final Topic). A bare string is sugar for
# { type = "agent", command = "<string>" }. When topic_agents is unset, the
# default is a single truncate step with set_if = "empty" (today's truncation
# behaviour). Each step carries a set_if guard checked against @pop_topic_kind
# (empty | empty_or_seed | always). Provenance (seed | final) lives in
# @pop_topic_kind alongside the display slug @pop_topic. The truncate step runs
# synchronously in the prompt hook and writes the seed; the agent-step chain is
# then enqueued on the pop monitor daemon and runs on the daemon (not in the
# hook), upgrading the Topic to final when an agent step lands, with per-pane
# single-flight so set_if = "always" regeneration can't pile up overlapping
# model calls. When the monitor TCP server is off the agent steps fall back to
# running synchronously in the hook.
#
# Curated agent commands:
#   "claude"          -> claude -p --output-format json (result text extracted)
#   "ollama:<model>"  -> a local ollama model, e.g. "ollama:llama3.2"
#   "cmd:<command>"   -> escape hatch: any CLI, run via `sh -c`, fed pop's
#                        per-derive JSON payload on stdin (alias "sh:")
# Agent steps may also set `args = ["..."]` (appended to the curated argv) and
# `timeout = <seconds>` (overriding the global topic_derivation_timeout). The
# cmd: payload includes `prev_topic_kind` (`seed`/`final`/empty) alongside
# `prev_topic` so scripts know what they are replacing.
#
# topic_agents = [
#   { type = "truncate", set_if = "empty" },
#   { type = "agent", command = "claude", set_if = "empty_or_seed" },
#   { type = "agent", command = "ollama:gemma4:e4b", args = ["--thinking", "no"], timeout = 120 },
# ]
# topic_agents = ["claude", "ollama:llama3.2"]  # back-compat bare strings
#
# Word cap applied to a derived Topic after it is normalized into a lowercase
# kebab slug (e.g. debugging-auth-middleware). Defaults to 5.
# topic_words = 5

# [updates]
# Gate the picker Update notice and the daily background update check.
# When false, pop makes zero automatic network calls — an explicit
# `pop doctor` run becomes the only update check (doctor always checks live).
# Defaults to true.
# notice_enabled = true

# [queue]
# Supervisor timing for `pop queue run`. Agent selection is configured under
# [tasks.implement].agents (see above), not in this section.
# poll_interval = "60s"
# agent_quota_retry_after = "1h"
# crash_retry_delays = ["1m", "5m", "15m"]

# Per-agent effort ladders map task effort to ordered { model, reasoning }
# entries. reasoning is optional; a model-only entry resolves just --model.
# Built-in ladders exist for claude/codex/cursor/pi; configuring an agent here
# fully replaces that agent's built-in ladder.
# [effort.opencode]
# heavy = [{ model = "opencode/claude-opus-4-8", reasoning = "high" }]
# standard = [{ model = "opencode/claude-sonnet-4-6", reasoning = "medium" }]
# light = [{ model = "opencode/kimi-k2.6" }]

# [tasks]
# Task attempt retry schedule and caps (ADR-0099). Delays apply between
# retry-eligible failures for both implement and verify; attempt 1 still starts
# immediately. Omitted attempt_retry_delays ⇒ ["1m", "5m", "15m"]; an empty list
# restores instant retries (useful for tests/local dev). The last delay repeats
# when retries exceed the list length.
# max_tries = 3
# attempt_retry_delays = ["1m", "5m", "15m"]
#
# [tasks.implement]
# max_tries = 5                         # optional implement override
# agents = ["claude", "codex"]

# [tasks.git]
# Commit-time git config applied ONLY to pop's own commits during a task drain
# (the implementation commit and the commit-and-continue dirty checkpoint). Each
# entry is a git `-c`-style `key=value` string, prepended as a `-c key=value`
# pair. Absent/empty ⇒ commits behave exactly as today. Use this to disable GPG
# signing so an unattended queue drain never hangs on a 1Password presence
# prompt. Your own `~/.gitconfig` and pop's other git calls are unaffected.
# commit_config_overrides = ["commit.gpgsign=false"]

# [dashboard]
# Initial cursor strategy. Available: "current_registered", "current_any",
# "first_active". "current_any" adds the current pane as a virtual clear entry
# when it is not monitored, without registering it in the monitor state.
# cursor_position = "current_registered"
#
# Sort criteria chain. Each criterion is applied in order; the first that
# distinguishes two panes wins. Available: "status", "pane_last_active_at",
# "session_last_visit_at", "alphabetical"
# sort_criteria = ["status", "pane_last_active_at", "alphabetical"]
#
# When you select a pane from the dashboard, pop maximizes (zooms) it within
# its window. Set this to false to focus the pane in place instead, keeping the
# window's split layout visible (e.g. an editor above, an agent below).
# zoom_on_switch = true
